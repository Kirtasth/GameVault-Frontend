@if (game) {
<div
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm transition-opacity duration-300"
     [class.animate-fade-in]="!isClosing"
     [class.animate-fade-out]="isClosing"
     (click)="onClose()">
  <div class="relative w-full max-w-2xl bg-white/95 backdrop-blur-md rounded-xl shadow-2xl overflow-hidden transform transition-all duration-300"
       [class.animate-scale-in]="!isClosing"
       [class.animate-scale-out]="isClosing"
       (click)="$event.stopPropagation()">

    <!-- Header Image -->
    <div class="relative h-64 w-full">
      <img [src]="game.imageUrl || 'assets/placeholder-game.jpg'" [alt]="game.title" class="w-full h-full object-cover">
      <button (click)="onClose()" class="absolute top-4 right-4 p-2 bg-black/50 rounded-full text-white hover:bg-black/75 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-6">
        <h2 class="text-3xl font-bold text-white shadow-sm">{{ game.title }}</h2>
      </div>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-4">
      <div class="flex justify-between items-start">
        <div class="space-y-2">
          <div class="flex flex-wrap gap-2">
            @for (tag of game.tags; track tag) {
            <span class="px-3 py-1 text-xs font-semibold text-peacock-teal bg-peacock-teal/10 rounded-full">
              {{ tag }}
            </span>
            }
          </div>
          <p class="text-sm text-gray-500">Released: {{ game.releaseDate | date:'mediumDate' }}</p>
        </div>
        <div class="text-right">
          <span class="text-2xl font-bold text-peacock-teal">${{ game.price }}</span>
        </div>
      </div>

      <p class="text-gray-700 leading-relaxed">
        {{ game.description }}
      </p>

      <!-- Actions -->
      <div class="pt-4 flex gap-4">
        <button (click)="addToCart()" class="flex-1 px-6 py-3 bg-peacock-teal text-white font-semibold rounded-lg shadow-md hover:bg-peacock-teal/80 focus:outline-none focus:ring-2 focus:ring-peacock-teal focus:ring-offset-2 transition-colors">
          Add to Cart
        </button>
      </div>
    </div>
  </div>
</div>
}
