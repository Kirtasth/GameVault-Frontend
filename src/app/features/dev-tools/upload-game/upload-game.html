<div class="bg-white/5 border border-white/10 p-6 rounded-xl max-w-2xl mx-auto">
  <h2 class="text-xl font-semibold mb-6 text-peacock-teal">Upload New Game</h2>

  <form [formGroup]="uploadGameForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Game Title</label>
      <input type="text" formControlName="title" class="w-full rounded-lg bg-white/5 border border-white/10 focus:border-peacock-teal focus:ring-1 focus:ring-peacock-teal text-white placeholder-gray-500 p-3 transition-colors" placeholder="Enter game title">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
      <textarea formControlName="description" class="w-full rounded-lg bg-white/5 border border-white/10 focus:border-peacock-teal focus:ring-1 focus:ring-peacock-teal text-white placeholder-gray-500 p-3 transition-colors" rows="4" placeholder="Enter game description"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Price ($)</label>
        <input type="number" formControlName="price" class="w-full rounded-lg bg-white/5 border border-white/10 focus:border-peacock-teal focus:ring-1 focus:ring-peacock-teal text-white placeholder-gray-500 p-3 transition-colors" placeholder="0.00">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Release Date</label>
        <input type="date" formControlName="releaseDate" class="w-full rounded-lg bg-white/5 border border-white/10 focus:border-peacock-teal focus:ring-1 focus:ring-peacock-teal text-white placeholder-gray-500 p-3 transition-colors">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">Game Image</label>
      <div class="flex justify-center px-6 pt-5 pb-6 border-2 border-white/10 border-dashed rounded-lg hover:border-peacock-teal/50 transition-colors bg-white/5">
        <div class="space-y-2 text-center">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <div class="flex text-sm text-gray-400 justify-center">
            <label for="file-upload" class="relative cursor-pointer rounded-md font-medium text-peacock-teal hover:text-peacock-teal/80 focus-within:outline-none">
              <span>Upload a file</span>
              <input id="file-upload" name="file-upload" type="file" class="sr-only" (change)="onFileSelected($event)">
            </label>
            <p class="pl-1">or drag and drop</p>
          </div>
          <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
          @if (selectedFile) {
            <p class="text-sm text-peacock-teal mt-2">Selected: {{ selectedFile.name }}</p>
          }
        </div>
      </div>
    </div>

    <div class="pt-4">
      <button type="submit" [disabled]="!uploadGameForm.valid || !selectedFile || isSubmitting" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-peacock-teal hover:bg-peacock-teal/80 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-peacock-teal transition-all transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed">
        @if (isSubmitting) {
          <span class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Processing...
          </span>
        } @else {
          Submit Game
        }
      </button>
    </div>
  </form>
</div>
