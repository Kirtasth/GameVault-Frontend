name: GameVault Frontend Deploy Pipeline
on:
  push:
    branches:
      - pre

jobs:
  build_and_test:
    runs-on: [self-hosted, local]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Lint Code
        run: npm run lint
      # Uncomment when unit tests are set up
      # - name: Run Tests
      #   run: npm run test -- --watch=false --browsers=ChromeHeadless

  build_docker_image:
    runs-on: [self-hosted, local]
    needs:
      - build_and_test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t gamevault-frontend:latest .
      - name: Deploy the Container
        run: docker compose -f /infra/compose.yaml up -d --no-deps --force-recreate frontend
